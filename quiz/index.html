<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题练习 - Tandy's Blog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060b18;color:#e2e8f0;min-height:100vh;
  background-image:
    radial-gradient(ellipse at 15% 40%,rgba(56,189,248,.12) 0,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(99,102,241,.12) 0,transparent 55%),
    radial-gradient(ellipse at 50% 90%,rgba(168,85,247,.08) 0,transparent 50%)}
.app{max-width:820px;margin:0 auto;padding:20px}
<p>/* 顶部 hero */<br>
.hero{text-align:center;padding:48px 0 36px;position:relative}<br>
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;<br>
background:rgba(125,211,252,.08);border:1px solid rgba(125,211,252,.2);<br>
font-size:.75rem;color:#7dd3fc;letter-spacing:.08em;text-transform:uppercase;margin-bottom:18px}<br>
.hero-badge::before{content:‘’;width:6px;height:6px;border-radius:50%;background:#7dd3fc;<br>
box-shadow:0 0 8px #7dd3fc;animation:pulse 2s infinite}<br>
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}<br>
h1{font-size:2.2rem;font-weight:700;line-height:1.2;margin-bottom:12px;<br>
background:linear-gradient(135deg,#e2e8f0 0%,#7dd3fc 40%,#818cf8 100%);<br>
-webkit-background-clip:text;-webkit-text-fill-color:transparent}<br>
.hero-sub{color:#475569;font-size:.9rem;margin-bottom:28px}<br>
.stats-row{display:flex;justify-content:center;gap:28px}<br>
.stat-pill{display:flex;flex-direction:column;align-items:center}<br>
.stat-pill .num{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#7dd3fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}<br>
.stat-pill .lbl{font-size:.73rem;color:#334155;margin-top:2px}</p>
<p>/* 分隔线 */<br>
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:4px 0 28px}</p>
<p>.subtitle{display:none}</p>
<p>/* 玻璃卡片基础 */<br>
.glass{background:rgba(255,255,255,.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:16px}</p>
<p>/* 主菜单 */<br>
.menu{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}<br>
.menu-card{<br>
padding:28px 20px;cursor:pointer;text-align:center;transition:all .3s;border-radius:18px;<br>
background:rgba(255,255,255,.03);backdrop-filter:blur(20px);<br>
border:1px solid rgba(255,255,255,.07);position:relative;overflow:hidden}<br>
.menu-card::before{<br>
content:‘’;position:absolute;inset:0;opacity:0;transition:opacity .3s;<br>
background:radial-gradient(circle at 50% 0%,rgba(125,211,252,.12),transparent 70%)}<br>
.menu-card:hover{transform:translateY(-3px);border-color:rgba(125,211,252,.35);<br>
box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(125,211,252,.1) inset}<br>
.menu-card:hover::before{opacity:1}<br>
.menu-card:nth-child(2):hover{border-color:rgba(129,140,248,.35);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(129,140,248,.1) inset}<br>
.menu-card:nth-child(2)::before{background:radial-gradient(circle at 50% 0%,rgba(129,140,248,.12),transparent 70%)}<br>
.menu-card:nth-child(3):hover{border-color:rgba(239,68,68,.3)}<br>
.menu-card:nth-child(3)::before{background:radial-gradient(circle at 50% 0%,rgba(239,68,68,.1),transparent 70%)}<br>
.menu-card:nth-child(4):hover{border-color:rgba(52,211,153,.3)}<br>
.menu-card:nth-child(4)::before{background:radial-gradient(circle at 50% 0%,rgba(52,211,153,.08),transparent 70%)}<br>
.menu-card .icon{font-size:2rem;margin-bottom:10px;display:block}<br>
.menu-card h3{font-size:.98rem;color:#e2e8f0;margin-bottom:5px;font-weight:600}<br>
.menu-card p{font-size:.8rem;color:#475569;line-height:1.4}<br>
.menu-card .card-tag{<br>
display:inline-block;margin-top:10px;font-size:.7rem;padding:2px 9px;border-radius:999px;<br>
background:rgba(125,211,252,.08);border:1px solid rgba(125,211,252,.2);color:#7dd3fc}<br>
.menu-card:nth-child(2) .card-tag{background:rgba(129,140,248,.08);border-color:rgba(129,140,248,.2);color:#818cf8}<br>
.menu-card:nth-child(3) .card-tag{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#f87171}<br>
.wrong-count{background:rgba(239,68,68,.8);color:#fff;font-size:.7rem;padding:1px 7px;border-radius:999px;margin-left:5px}</p>
<p>/* 周次选择 */<br>
.week-selector{margin-bottom:16px}<br>
.week-selector select{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e2e8f0;font-size:.9rem;cursor:pointer}<br>
.week-selector select option{background:#0f172a}</p>
<p>/* 题目卡片 */<br>
.card{padding:24px;margin-bottom:14px;border-radius:16px;<br>
background:rgba(255,255,255,.04);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)}<br>
.progress{display:flex;align-items:center;gap:12px;margin-bottom:18px}<br>
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px}<br>
.progress-fill{height:100%;background:linear-gradient(90deg,#7dd3fc,#818cf8);border-radius:2px;transition:width .4s ease}<br>
.progress-text{font-size:.82rem;color:#64748b;white-space:nowrap}<br>
.week-tag{display:inline-block;font-size:.75rem;color:#7dd3fc;background:rgba(125,211,252,.1);border:1px solid rgba(125,211,252,.2);padding:3px 10px;border-radius:999px;margin-bottom:14px}<br>
.question{font-size:1.05rem;line-height:1.75;color:#e2e8f0;margin-bottom:22px}</p>
<p>/* ===== 选项卡片 ===== */<br>
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}<br>
.option{<br>
display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;<br>
border-radius:12px;border:1px solid rgba(255,255,255,.1);<br>
background:rgba(255,255,255,.03);backdrop-filter:blur(12px);<br>
transition:all .2s;position:relative;overflow:hidden;<br>
}<br>
.option::before{content:‘’;position:absolute;inset:0;opacity:0;transition:opacity .2s}<br>
.option:hover:not(.disabled){border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.08)}<br>
.option:hover:not(.disabled) .opt-check{border-color:rgba(99,102,241,.8)}</p>
<p>/* 复选框 */<br>
.opt-check{<br>
width:22px;height:22px;border-radius:6px;flex-shrink:0;<br>
border:2px solid rgba(255,255,255,.2);<br>
background:rgba(255,255,255,.04);backdrop-filter:blur(8px);<br>
display:flex;align-items:center;justify-content:center;<br>
transition:all .2s;font-size:.85rem;<br>
}<br>
.opt-text{font-size:.95rem;color:#cbd5e1;flex:1;line-height:1.5}<br>
.opt-letter{font-size:.8rem;color:#64748b;font-weight:600;min-width:18px}</p>
<p>/* 选中状态（待确认）- 蓝色 */<br>
.option.selected{border-color:rgba(99,102,241,.7);background:rgba(99,102,241,.1)}<br>
.option.selected .opt-check{background:rgba(99,102,241,.8);border-color:#818cf8;box-shadow:0 0 12px rgba(99,102,241,.4)}<br>
.option.selected .opt-check::after{content:‘✓’;color:#fff;font-size:.75rem}<br>
.option.selected .opt-text{color:#e2e8f0}</p>
<p>/* 正确答案 - 绿色 */<br>
.option.correct{border-color:rgba(52,211,153,.7);background:rgba(52,211,153,.08)}<br>
.option.correct .opt-check{background:rgba(52,211,153,.8);border-color:#34d399;box-shadow:0 0 14px rgba(52,211,153,.35)}<br>
.option.correct .opt-check::after{content:‘✓’;color:#fff;font-size:.75rem}<br>
.option.correct .opt-text{color:#6ee7b7}</p>
<p>/* 错误选项 - 红色 */<br>
.option.wrong{border-color:rgba(239,68,68,.6);background:rgba(239,68,68,.08)}<br>
.option.wrong .opt-check{background:rgba(239,68,68,.75);border-color:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.3)}<br>
.option.wrong .opt-check::after{content:‘✗’;color:#fff;font-size:.75rem}<br>
.option.wrong .opt-text{color:#fca5a5}</p>
<p>.option.disabled{cursor:default}</p>
<p>/* 答案解析框 */<br>
.explanation-box{<br>
margin-top:14px;padding:14px 16px;border-radius:10px;<br>
background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);<br>
font-size:.88rem;color:#94a3b8;line-height:1.65;<br>
animation:fadeIn .3s ease<br>
}<br>
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}</p>
<p>/* 背题模式答案区 */<br>
.answer-area{position:relative}<br>
.answer-blur{filter:blur(7px);user-select:none;transition:filter .3s}<br>
.answer-visible{filter:none}<br>
.answer-box{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:10px;padding:16px}<br>
.answer-label{font-size:.75rem;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}<br>
.answer-text{font-size:1rem;color:#34d399;font-weight:500}<br>
.answer-letter{display:inline-block;background:rgba(52,211,153,.2);color:#34d399;border-radius:6px;padding:2px 10px;margin-right:8px;font-weight:700}<br>
.explanation{margin-top:12px;font-size:.88rem;color:#64748b;line-height:1.6;border-top:1px solid rgba(255,255,255,.06);padding-top:12px}<br>
.reveal-btn{<br>
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);<br>
background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;<br>
padding:10px 26px;border-radius:10px;cursor:pointer;font-size:.9rem;z-index:10;<br>
box-shadow:0 4px 20px rgba(99,102,241,.4)<br>
}<br>
.reveal-btn:hover{opacity:.9;box-shadow:0 6px 24px rgba(99,102,241,.5)}</p>
<p>/* 操作按钮 */<br>
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}<br>
.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:500;flex:1;min-width:90px;transition:all .2s}<br>
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}<br>
.btn-primary:hover{opacity:.9;box-shadow:0 6px 18px rgba(99,102,241,.4)}<br>
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.25)}<br>
.btn-success:hover{opacity:.9}<br>
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 14px rgba(239,68,68,.25)}<br>
.btn-danger:hover{opacity:.9}<br>
.btn-ghost{background:rgba(255,255,255,.06);color:#94a3b8;border:1px solid rgba(255,255,255,.1)}<br>
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#e2e8f0}<br>
.btn:disabled{opacity:.35;cursor:not-allowed}</p>
<p>/* 错题本 */<br>
.wrong-list{display:flex;flex-direction:column;gap:12px}<br>
.wrong-item{padding:16px;border-radius:12px;background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.15)}<br>
.wrong-q{font-size:.93rem;color:#e2e8f0;margin-bottom:8px}<br>
.wrong-a{font-size:.87rem;color:#34d399}<br>
.wrong-exp{font-size:.82rem;color:#64748b;margin-top:6px}<br>
.empty-state{text-align:center;padding:60px 20px;color:#334155}<br>
.empty-state .icon{font-size:3rem;margin-bottom:12px}</p>
<p>/* 结果页 */<br>
.result{text-align:center;padding:40px 20px}<br>
.result-score{font-size:3.5rem;font-weight:700;background:linear-gradient(135deg,#7dd3fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0}<br>
.result-stats{display:flex;gap:16px;justify-content:center;margin-bottom:28px}<br>
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 22px;text-align:center}<br>
.stat-num{font-size:1.6rem;font-weight:700}<br>
.stat-label{font-size:.78rem;color:#64748b}</p>
<p>.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:#64748b;cursor:pointer;font-size:.88rem;padding:4px 0;margin-bottom:14px}<br>
.back-btn:hover{color:#e2e8f0}<br>
</style></p>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="hero-badge">✦ Quiz System</div>
    <h1 id="刷题练习">刷题练习</h1>
    <p class="hero-sub">系统性掌握知识点，告别死记硬背</p>
    <div class="stats-row">
      <div class="stat-pill"><span class="num">269</span><span class="lbl">题目总数</span></div>
      <div class="stat-pill"><span class="num">18</span><span class="lbl">章节覆盖</span></div>
      <div class="stat-pill"><span class="num">3</span><span class="lbl">练习模式</span></div>
    </div>
  </div>
  <div class="divider"></div>
  <p class="subtitle"></p>
  <div id="root"></div>
</div>
<script></script>
<script src="questions.js"></script>
<script>
const LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O'];
<p>const state = {<br>
mode: ‘menu’,<br>
currentIndex: 0,<br>
revealed: false,<br>
selected: null,       // 随机模式选中的选项索引<br>
answered: false,      // 随机模式是否已作答<br>
wrongIds: JSON.parse(localStorage.getItem(‘quiz_wrong’) || ‘[]’),<br>
studyWeek: ‘all’,<br>
filteredQ: [],<br>
randomQ: [],<br>
randomOpts: [],       // 当前题的选项列表 [{letter,text,isCorrect}]<br>
score: { correct: 0, wrong: 0 },<br>
finished: false,<br>
};</p>
<p>const weeks = […new Set(QUIZ_DATA.map(q =&gt; q.week))];<br>
function saveWrong(){ localStorage.setItem(‘quiz_wrong’, JSON.stringify(state.wrongIds)); }<br>
function addWrong(id){ if(!state.wrongIds.includes(id)){state.wrongIds.push(id);saveWrong();} }<br>
function removeWrong(id){ state.wrongIds=state.wrongIds.filter(x=&gt;x!==id);saveWrong(); }</p>
<p>// 为每道题生成选项（1个正确 + 3个干扰项）<br>
function buildOptions(q, allQ) {<br>
const correct = { letter: q.answer_letter, text: q.answer, isCorrect: true };<br>
// 从同 week 优先，再全局随机取干扰项<br>
const pool = allQ.filter(x =&gt; <a href="http://x.id">x.id</a> !== <a href="http://q.id">q.id</a>);<br>
const shuffled = pool.sort(() =&gt; Math.random() - 0.5).slice(0, 3);<br>
const distractors = shuffled.map(x =&gt; ({ letter: x.answer_letter, text: x.answer, isCorrect: false }));<br>
const opts = [correct, …distractors].sort(() =&gt; Math.random() - 0.5);<br>
// 重新分配字母 A/B/C/D<br>
return opts.map((o, i) =&gt; ({ …o, displayLetter: LETTERS[i] }));<br>
}</p>
<p>function render() {<br>
const root = document.getElementById(‘root’);<br>
if (state.mode === ‘menu’) root.innerHTML = renderMenu();<br>
else if (state.mode === ‘study’) root.innerHTML = renderStudy();<br>
else if (state.mode === ‘random’) root.innerHTML = renderRandom();<br>
else if (state.mode === ‘wrong’) root.innerHTML = renderWrong();<br>
else if (state.mode === ‘result’) root.innerHTML = renderResult();<br>
}</p>
<p>function renderMenu() {<br>
return <code>     &lt;div class=&quot;menu&quot;&gt;       &lt;div class=&quot;menu-card&quot; onclick=&quot;startStudy()&quot;&gt;         &lt;span class=&quot;icon&quot;&gt;📖&lt;/span&gt;         &lt;h3&gt;背题模式&lt;/h3&gt;         &lt;p&gt;按章节顺序浏览，点击显示答案与解析&lt;/p&gt;         &lt;span class=&quot;card-tag&quot;&gt;顺序学习&lt;/span&gt;       &lt;/div&gt;       &lt;div class=&quot;menu-card&quot; onclick=&quot;startRandom()&quot;&gt;         &lt;span class=&quot;icon&quot;&gt;🎲&lt;/span&gt;         &lt;h3&gt;随机刷题&lt;/h3&gt;         &lt;p&gt;四选一智能出题，即时反馈对错&lt;/p&gt;         &lt;span class=&quot;card-tag&quot;&gt;强化训练&lt;/span&gt;       &lt;/div&gt;       &lt;div class=&quot;menu-card&quot; onclick=&quot;startWrong()&quot;&gt;         &lt;span class=&quot;icon&quot;&gt;❌&lt;/span&gt;         &lt;h3&gt;错题本 &lt;span class=&quot;wrong-count&quot;&gt;$&#123;state.wrongIds.length&#125;&lt;/span&gt;&lt;/h3&gt;         &lt;p&gt;集中复习所有做错的题目&lt;/p&gt;         &lt;span class=&quot;card-tag&quot;&gt;查漏补缺&lt;/span&gt;       &lt;/div&gt;       &lt;div class=&quot;menu-card&quot; onclick=&quot;window.location.href='/'&quot;&gt;         &lt;span class=&quot;icon&quot;&gt;🏠&lt;/span&gt;         &lt;h3&gt;返回博客&lt;/h3&gt;         &lt;p&gt;回到 Tandy's Blog 首页&lt;/p&gt;         &lt;span class=&quot;card-tag&quot; style=&quot;background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.2);color:#34d399&quot;&gt;← 返回&lt;/span&gt;       &lt;/div&gt;     &lt;/div&gt;</code>;<br>
}</p>
<p>function renderStudy() {<br>
const q = state.filteredQ[state.currentIndex];<br>
if (!q) return ‘<div class="empty-state"><div class="icon">✅</div><p>已浏览全部题目</p></div>’;<br>
const total = state.filteredQ.length;<br>
const pct = ((state.currentIndex+1)/total*100).toFixed(0);<br>

<p>function renderResult() {<br>
const total = state.score.correct + state.score.wrong;<br>
const pct = total ? Math.round(state.score.correct/total*100) : 0;<br>
const msg = pct&gt;=90?‘🎉 优秀！’:pct&gt;=70?‘👍 不错！’:pct&gt;=50?‘💪 继续加油！’:‘📚 需要多练习’;<br>
return <code>     &lt;div class=&quot;result&quot;&gt;       &lt;div style=&quot;font-size:1.1rem;color:#64748b&quot;&gt;$&#123;msg&#125;&lt;/div&gt;       &lt;div class=&quot;result-score&quot;&gt;$&#123;pct&#125;%&lt;/div&gt;       &lt;div class=&quot;result-stats&quot;&gt;         &lt;div class=&quot;stat&quot;&gt;&lt;div class=&quot;stat-num&quot; style=&quot;color:#34d399&quot;&gt;$&#123;state.score.correct&#125;&lt;/div&gt;&lt;div class=&quot;stat-label&quot;&gt;答对&lt;/div&gt;&lt;/div&gt;         &lt;div class=&quot;stat&quot;&gt;&lt;div class=&quot;stat-num&quot; style=&quot;color:#ef4444&quot;&gt;$&#123;state.score.wrong&#125;&lt;/div&gt;&lt;div class=&quot;stat-label&quot;&gt;答错&lt;/div&gt;&lt;/div&gt;         &lt;div class=&quot;stat&quot;&gt;&lt;div class=&quot;stat-num&quot; style=&quot;color:#7dd3fc&quot;&gt;$&#123;total&#125;&lt;/div&gt;&lt;div class=&quot;stat-label&quot;&gt;总题数&lt;/div&gt;&lt;/div&gt;       &lt;/div&gt;       &lt;div class=&quot;actions&quot; style=&quot;justify-content:center;max-width:300px;margin:0 auto&quot;&gt;         &lt;button class=&quot;btn btn-primary&quot; onclick=&quot;startRandom()&quot;&gt;再来一轮&lt;/button&gt;         &lt;button class=&quot;btn btn-ghost&quot; onclick=&quot;goMenu()&quot;&gt;返回菜单&lt;/button&gt;       &lt;/div&gt;     &lt;/div&gt;</code>;<br>
}</p>
<p>// ===== 交互 =====<br>
function goMenu(){ state.mode=‘menu’; render(); }</p>
<p>function startStudy(){<br>
state.mode=‘study’; state.studyWeek=‘all’;<br>
state.filteredQ=[…QUIZ_DATA]; state.currentIndex=0; state.revealed=false; render();<br>
}<br>
function changeWeek(val){<br>
state.studyWeek=val;<br>
state.filteredQ=val===‘all’?[…QUIZ_DATA]:QUIZ_DATA.filter(q=&gt;q.week===val);<br>
state.currentIndex=0; state.revealed=false; render();<br>
}<br>
function reveal(){ state.revealed=true; render(); }<br>
function prevQ(){ if(state.currentIndex&gt;0){state.currentIndex–;state.revealed=false;render();} }<br>
function nextQ(){ if(state.currentIndex&lt;state.filteredQ.length-1){state.currentIndex++;state.revealed=false;render();} }<br>
function toggleWrong(id){ if(state.wrongIds.includes(id)) removeWrong(id); else addWrong(id); render(); }</p>
<p>function startRandom(){<br>
state.mode=‘random’;<br>
state.randomQ=[…QUIZ_DATA].sort(()=&gt;Math.random()-.5);<br>
state.currentIndex=0; state.selected=null; state.answered=false;<br>
state.score={correct:0,wrong:0}; state.finished=false;<br>
state.randomOpts=buildOptions(state.randomQ[0], QUIZ_DATA);<br>
render();<br>
}</p>
<p>function selectOpt(i){<br>
if(state.answered) return;<br>
state.selected = i;<br>
state.answered = true;<br>
const isCorrect = state.randomOpts[i].isCorrect;<br>
if(isCorrect) state.score.correct++;<br>
else { state.score.wrong++; addWrong(state.randomQ[state.currentIndex].id); }<br>
render();<br>
}</p>
<p>function nextRandom(){<br>
if(state.currentIndex &lt; state.randomQ.length-1){<br>
state.currentIndex++;<br>
state.selected=null; state.answered=false;<br>
state.randomOpts=buildOptions(state.randomQ[state.currentIndex], QUIZ_DATA);<br>
render();<br>
} else { state.finished=true; render(); }<br>
}</p>
<p>function startWrong(){ state.mode=‘wrong’; render(); }</p>
<p>render();<br>
</script></p>
