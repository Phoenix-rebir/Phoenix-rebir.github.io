<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题练习 - Tandy's Blog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060b18;color:#e2e8f0;min-height:100vh;
  background-image:
    radial-gradient(ellipse at 15% 40%,rgba(56,189,248,.12) 0,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(99,102,241,.12) 0,transparent 55%),
    radial-gradient(ellipse at 50% 90%,rgba(168,85,247,.08) 0,transparent 50%)}
.app{max-width:820px;margin:0 auto;padding:20px}

/* 顶部 hero */
.hero{text-align:center;padding:48px 0 36px;position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;
  background:rgba(125,211,252,.08);border:1px solid rgba(125,211,252,.2);
  font-size:.75rem;color:#7dd3fc;letter-spacing:.08em;text-transform:uppercase;margin-bottom:18px}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#7dd3fc;
  box-shadow:0 0 8px #7dd3fc;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-size:2.2rem;font-weight:700;line-height:1.2;margin-bottom:12px;
  background:linear-gradient(135deg,#e2e8f0 0%,#7dd3fc 40%,#818cf8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{color:#475569;font-size:.9rem;margin-bottom:28px}
.stats-row{display:flex;justify-content:center;gap:28px}
.stat-pill{display:flex;flex-direction:column;align-items:center}
.stat-pill .num{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#7dd3fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-pill .lbl{font-size:.73rem;color:#334155;margin-top:2px}

/* 分隔线 */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:4px 0 28px}

.subtitle{display:none}

/* 玻璃卡片基础 */
.glass{background:rgba(255,255,255,.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:16px}

/* 主菜单 */
.menu{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.menu-card{
  padding:28px 20px;cursor:pointer;text-align:center;transition:all .3s;border-radius:18px;
  background:rgba(255,255,255,.03);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.07);position:relative;overflow:hidden}
.menu-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;
  background:radial-gradient(circle at 50% 0%,rgba(125,211,252,.12),transparent 70%)}
.menu-card:hover{transform:translateY(-3px);border-color:rgba(125,211,252,.35);
  box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(125,211,252,.1) inset}
.menu-card:hover::before{opacity:1}
.menu-card:nth-child(2):hover{border-color:rgba(129,140,248,.35);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(129,140,248,.1) inset}
.menu-card:nth-child(2)::before{background:radial-gradient(circle at 50% 0%,rgba(129,140,248,.12),transparent 70%)}
.menu-card:nth-child(3):hover{border-color:rgba(239,68,68,.3)}
.menu-card:nth-child(3)::before{background:radial-gradient(circle at 50% 0%,rgba(239,68,68,.1),transparent 70%)}
.menu-card:nth-child(4):hover{border-color:rgba(52,211,153,.3)}
.menu-card:nth-child(4)::before{background:radial-gradient(circle at 50% 0%,rgba(52,211,153,.08),transparent 70%)}
.menu-card .icon{font-size:2rem;margin-bottom:10px;display:block}
.menu-card h3{font-size:.98rem;color:#e2e8f0;margin-bottom:5px;font-weight:600}
.menu-card p{font-size:.8rem;color:#475569;line-height:1.4}
.menu-card .card-tag{
  display:inline-block;margin-top:10px;font-size:.7rem;padding:2px 9px;border-radius:999px;
  background:rgba(125,211,252,.08);border:1px solid rgba(125,211,252,.2);color:#7dd3fc}
.menu-card:nth-child(2) .card-tag{background:rgba(129,140,248,.08);border-color:rgba(129,140,248,.2);color:#818cf8}
.menu-card:nth-child(3) .card-tag{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#f87171}
.wrong-count{background:rgba(239,68,68,.8);color:#fff;font-size:.7rem;padding:1px 7px;border-radius:999px;margin-left:5px}

/* 周次选择 */
.week-selector{margin-bottom:16px}
.week-selector select{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#e2e8f0;font-size:.9rem;cursor:pointer}
.week-selector select option{background:#0f172a}

/* 题目卡片 */
.card{padding:24px;margin-bottom:14px;border-radius:16px;
  background:rgba(255,255,255,.04);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)}
.progress{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px}
.progress-fill{height:100%;background:linear-gradient(90deg,#7dd3fc,#818cf8);border-radius:2px;transition:width .4s ease}
.progress-text{font-size:.82rem;color:#64748b;white-space:nowrap}
.week-tag{display:inline-block;font-size:.75rem;color:#7dd3fc;background:rgba(125,211,252,.1);border:1px solid rgba(125,211,252,.2);padding:3px 10px;border-radius:999px;margin-bottom:14px}
.question{font-size:1.05rem;line-height:1.75;color:#e2e8f0;margin-bottom:22px}

/* ===== 选项卡片 ===== */
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.option{
  display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;
  border-radius:12px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);backdrop-filter:blur(12px);
  transition:all .2s;position:relative;overflow:hidden;
}
.option::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.option:hover:not(.disabled){border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.08)}
.option:hover:not(.disabled) .opt-check{border-color:rgba(99,102,241,.8)}

/* 复选框 */
.opt-check{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  border:2px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.04);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:.85rem;
}
.opt-text{font-size:.95rem;color:#cbd5e1;flex:1;line-height:1.5}
.opt-letter{font-size:.8rem;color:#64748b;font-weight:600;min-width:18px}

/* 选中状态（待确认）- 蓝色 */
.option.selected{border-color:rgba(99,102,241,.7);background:rgba(99,102,241,.1)}
.option.selected .opt-check{background:rgba(99,102,241,.8);border-color:#818cf8;box-shadow:0 0 12px rgba(99,102,241,.4)}
.option.selected .opt-check::after{content:'✓';color:#fff;font-size:.75rem}
.option.selected .opt-text{color:#e2e8f0}

/* 正确答案 - 绿色 */
.option.correct{border-color:rgba(52,211,153,.7);background:rgba(52,211,153,.08)}
.option.correct .opt-check{background:rgba(52,211,153,.8);border-color:#34d399;box-shadow:0 0 14px rgba(52,211,153,.35)}
.option.correct .opt-check::after{content:'✓';color:#fff;font-size:.75rem}
.option.correct .opt-text{color:#6ee7b7}

/* 错误选项 - 红色 */
.option.wrong{border-color:rgba(239,68,68,.6);background:rgba(239,68,68,.08)}
.option.wrong .opt-check{background:rgba(239,68,68,.75);border-color:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.3)}
.option.wrong .opt-check::after{content:'✗';color:#fff;font-size:.75rem}
.option.wrong .opt-text{color:#fca5a5}

.option.disabled{cursor:default}

/* 答案解析框 */
.explanation-box{
  margin-top:14px;padding:14px 16px;border-radius:10px;
  background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);
  font-size:.88rem;color:#94a3b8;line-height:1.65;
  animation:fadeIn .3s ease
}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* 背题模式答案区 */
.answer-area{position:relative}
.answer-blur{filter:blur(7px);user-select:none;transition:filter .3s}
.answer-visible{filter:none}
.answer-box{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:10px;padding:16px}
.answer-label{font-size:.75rem;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.answer-text{font-size:1rem;color:#34d399;font-weight:500}
.answer-letter{display:inline-block;background:rgba(52,211,153,.2);color:#34d399;border-radius:6px;padding:2px 10px;margin-right:8px;font-weight:700}
.explanation{margin-top:12px;font-size:.88rem;color:#64748b;line-height:1.6;border-top:1px solid rgba(255,255,255,.06);padding-top:12px}
.reveal-btn{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;
  padding:10px 26px;border-radius:10px;cursor:pointer;font-size:.9rem;z-index:10;
  box-shadow:0 4px 20px rgba(99,102,241,.4)
}
.reveal-btn:hover{opacity:.9;box-shadow:0 6px 24px rgba(99,102,241,.5)}

/* 操作按钮 */
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:500;flex:1;min-width:90px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.btn-primary:hover{opacity:.9;box-shadow:0 6px 18px rgba(99,102,241,.4)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.25)}
.btn-success:hover{opacity:.9}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 14px rgba(239,68,68,.25)}
.btn-danger:hover{opacity:.9}
.btn-ghost{background:rgba(255,255,255,.06);color:#94a3b8;border:1px solid rgba(255,255,255,.1)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#e2e8f0}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* 错题本 */
.wrong-list{display:flex;flex-direction:column;gap:12px}
.wrong-item{padding:16px;border-radius:12px;background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.15)}
.wrong-q{font-size:.93rem;color:#e2e8f0;margin-bottom:8px}
.wrong-a{font-size:.87rem;color:#34d399}
.wrong-exp{font-size:.82rem;color:#64748b;margin-top:6px}
.empty-state{text-align:center;padding:60px 20px;color:#334155}
.empty-state .icon{font-size:3rem;margin-bottom:12px}

/* 结果页 */
.result{text-align:center;padding:40px 20px}
.result-score{font-size:3.5rem;font-weight:700;background:linear-gradient(135deg,#7dd3fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0}
.result-stats{display:flex;gap:16px;justify-content:center;margin-bottom:28px}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 22px;text-align:center}
.stat-num{font-size:1.6rem;font-weight:700}
.stat-label{font-size:.78rem;color:#64748b}

.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:#64748b;cursor:pointer;font-size:.88rem;padding:4px 0;margin-bottom:14px}
.back-btn:hover{color:#e2e8f0}

/* 题目索引面板 */
.quiz-layout{display:flex;gap:14px;align-items:flex-start}
.quiz-main{flex:1;min-width:0}
.idx-panel{width:130px;flex-shrink:0;background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px;position:sticky;top:20px}
.idx-title{font-size:.68rem;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;text-align:center}
.idx-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;max-height:70vh;overflow-y:auto}
.idx-grid::-webkit-scrollbar{width:3px}
.idx-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.ib{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.65rem;border-radius:4px;cursor:pointer;border:none;background:rgba(255,255,255,.05);color:#475569;transition:all .15s;padding:0;width:100%}
.ib:hover{background:rgba(255,255,255,.12);color:#e2e8f0}
.ib.cur{background:rgba(99,102,241,.8);color:#fff;box-shadow:0 0 8px rgba(99,102,241,.5)}
.ib.ok{background:rgba(52,211,153,.55);color:#fff}
.ib.err{background:rgba(239,68,68,.55);color:#fff}
.ib.mark{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
</style>
</head>

  <div id="root"></div>
</div>
<script>
const QUIZ_DATA = [{"id":1,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What do APIs enable between different software systems?","answer_letter":"N","answer":"Communication and data sharing","explanation":"解析：API（应用程序接口）的核心作用是实现不同软件系统之间的通信和数据共享。"},{"id":2,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What is a RESTful API mainly used for?","answer_letter":"K","answer":"Request-response communication","explanation":"解析：RESTful API 遵循 REST 架构风格，主要用于请求-响应模式的通信。"},{"id":3,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What do Stream APIs provide?","answer_letter":"E","answer":"Real-time data streaming","explanation":"解析：Stream API 专为实时数据流传输设计，如实时推文流。"},{"id":4,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What format is commonly used in API responses?","answer_letter":"O","answer":"JSON","explanation":"解析：JSON（JavaScript Object Notation）是 API 响应中最常见的数据格式，轻量且易解析。"},{"id":5,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What is OAuth used for?","answer_letter":"A","answer":"Secure authentication and authorization","explanation":"解析：OAuth 是一种授权协议，允许应用安全地访问用户资源，无需暴露密码。"},{"id":6,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What does an API endpoint represent?","answer_letter":"H","answer":"A specific API URL","explanation":"解析：API 端点（Endpoint）是一个特定的 URL，代表 API 中可访问的资源或功能。"},{"id":7,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What is required before accessing most APIs?","answer_letter":"C","answer":"API credentials","explanation":"解析：大多数 API 需要凭证（如 API Key）来验证请求者身份。"},{"id":8,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What is a common challenge when using APIs?","answer_letter":"G","answer":"Rate limits","explanation":"解析：速率限制（Rate Limit）是 API 常见挑战，防止滥用，如 Twitter API 有每15分钟请求次数限制。"},{"id":9,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What Python library simplifies Twitter API usage?","answer_letter":"L","answer":"Tweepy","explanation":"解析：Tweepy 是 Python 中专门封装 Twitter API 的库，大幅简化调用流程。"},{"id":10,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What does the GitHub API provide access to?","answer_letter":"F","answer":"Repository and developer data","explanation":"解析：GitHub API 提供对仓库、提交、开发者等数据的访问。"},{"id":11,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What type of data can the YouTube API retrieve?","answer_letter":"D","answer":"Video and comment data","explanation":"解析：YouTube Data API 可获取视频信息、评论、频道统计等数据。"},{"id":12,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What is JSON parsing used for?","answer_letter":"B","answer":"Extracting information from JSON","explanation":"解析：JSON 解析将 JSON 字符串转换为程序可操作的数据结构，用于提取所需信息。"},{"id":13,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"Why is data normalization important?","answer_letter":"I","answer":"Ensures consistency","explanation":"解析：数据归一化确保数据格式统一，提高分析一致性和准确性。"},{"id":14,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"What does tokenization do in text processing?","answer_letter":"J","answer":"Splits text into words","explanation":"解析：分词（Tokenization）将文本分割成词语或子词单元，是 NLP 的基础步骤。"},{"id":15,"week":"Week 1 Part 1 Quiz Questions \\& Answers","question":"Why is MongoDB suitable for social media data?","answer_letter":"M","answer":"Flexible storage for unstructured data","explanation":"解析：MongoDB 是 NoSQL 数据库，采用灵活的文档模型，适合存储结构不固定的社交媒体数据。"},{"id":16,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"How is structured data organized?","answer_letter":"E","answer":"Tables or databases","explanation":"解析：答案为「Tables or databases」。"},{"id":17,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"What is an example of unstructured social media data?","answer_letter":"A","answer":"Text posts","explanation":"解析：答案为「Text posts」。"},{"id":18,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"Why is data normalization important?","answer_letter":"K","answer":"Ensures consistency","explanation":"解析：数据归一化确保数据格式统一，提高分析一致性和准确性。"},{"id":19,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"What does tokenization do?","answer_letter":"C","answer":"Splits text into tokens","explanation":"解析：分词（Tokenization）将文本分割成词语或子词单元，是 NLP 的基础步骤。"},{"id":20,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"What are stop words?","answer_letter":"G","answer":"Common words with little meaning","explanation":"解析：答案为「Common words with little meaning」。"},{"id":21,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"What is stemming used for?","answer_letter":"J","answer":"Reducing words to roots","explanation":"解析：答案为「Reducing words to roots」。"},{"id":22,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"What does lemmatization consider?","answer_letter":"N","answer":"Dictionary meaning and context","explanation":"解析：答案为「Dictionary meaning and context」。"},{"id":23,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"Why is removing duplicates important?","answer_letter":"H","answer":"Prevents biased or skewed analysis","explanation":"解析：答案为「Prevents biased or skewed analysis」。"},{"id":24,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"What does exact matching identify?","answer_letter":"O","answer":"Identical records","explanation":"解析：答案为「Identical records」。"},{"id":25,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"What type of database is MongoDB?","answer_letter":"D","answer":"NoSQL database","explanation":"解析：答案为「NoSQL database」。  NoSQL 数据库适合非结构化数据存储。"},{"id":26,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"Why is MongoDB suitable for social media data?","answer_letter":"L","answer":"Flexible storage for unstructured data","explanation":"解析：MongoDB 是 NoSQL 数据库，采用灵活的文档模型，适合存储结构不固定的社交媒体数据。"},{"id":27,"week":"Week 1 Part 2 Quiz Questions & Answers","question":"What format does MongoDB use for documents?","answer_letter":"F","answer":"JSON-like documents","explanation":"解析：答案为「 swers","question":"What is the first requirement for a good machine learning model?","answer_letter":"O","answer":"Generalize well to unseen data","explanation":"解析：答案为「Generalize well to unseen data」。"},{"id":226,"week":"Week 6.1 - Second Part Quiz Questions & Answers","question":"Why is training accuracy alone not enough?","answer_letter":"E","answer":"It does not measure performance on new data","explanation":"解析：答案为「It does not measure performance on new data」。"},{"id":227,"week":"Week 6.1 - Second Part Quiz Questions & Answers","question":"What problem occurs when a model is too simple?","answer_letter":"N","answer":"Underfitting","explanation":"解析：答案为「Underfitting」。"},{"id":228,"week":"Week 6.1 - Second Part Quiz Questions & Answers","question":"What problem occurs when a model learns noise in the training data?","answer_letter":"A","answer":"Overfitting","explanation":"解析：答案为「Overfitting」。  过拟合指模型在训练集表现好但泛化差。"},{"id":229,"week":"Week 6.1 - Second Part Quiz Questions & Answers","question":"What is the goal when balancing underfitting and overfitting?","answer_letter":"J","answer":"Good generalization","explanation":"解析：答案为「Good generalization」。"},{"id":230,"week":"Week 6.1 - Second Part Quiz Questions & Answers","question":"What basic evaluation method uses one train/test split?","answer_letter":"H","answer":"Train/Test Split","explanation":"解析：答案为「Train/Test Split」。"},{"id":231,"week":"Week 6.1 - Second Part Quiz Questions & Answers","question":"What evaluation method provides more robust results than a single split?","answer_letter":"B","answer":"K-Fold Cross-Validation","explanation":"解析：答案为「K-Fold Cross-Validation」。  交叉验证通过多次划分训练/验证集，得到更可靠的评估结果。"},{"id":232,"week":"Week 6.1 - Second Part Quiz Questions & Answers","question":"What hyperparameter is commonly tuned in KNN?","answer_letter":"M","answer":"Number of neighbors (k)","explanation":"解析：答案为「Number of neighbors (k)」。"},{"id":233,"week":"Week 6.1 - Second Part Quiz Questions & Answers","question":"What :"L","answer":"Discover hidden patterns and structures","explanation":"解析：答案为「Discover hidden patterns and structures」。"},{"id":242,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"Which type of learning predicts known outcomes using labeled data?","answer_letter":"F","answer":"Supervised Learning","explanation":"解析：答案为「Supervised Learning」。  监督学习使用带标签的数据进行训练。"},{"id":243,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"What technique groups similar observations into meaningful clusters?","answer_letter":"C","answer":"Clustering","explanation":"解析：答案为「Clustering」。  聚类是无监督学习，将相似样本归为同一组。"},{"id":244,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"What unsupervised technique reduces the number of features while preserving important information?","answer_letter":"M","answer":"Dimensionality Reduction","explanation":"解析：答案为「Dimensionality Reduction」。"},{"id":245,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"What technique discovers relationships and co-occurrence patterns between variables?","answer_letter":"I","answer":"Association Rule Mining","explanation":"解析：答案为「Association Rule Mining」。"},{"id":246,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"Which unsupervised task identifies unusual observations that differ from normal behavior?","answer_letter":"J","answer":"Anomaly Detection","explanation":"解析：答案为「Anomaly Detection」。"},{"id":247,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"What is the center of a cluster in K-Means called?","answer_letter":"N","answer":"Centroid","explanation":"解析：答案为「Centroid」。"},{"id":248,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"Which distance metric is most commonly used in K-Means?","answer_letter":"O","answer":"Euclidean Distance","explanation":"解析：答案为「Euclidean Distance」。"},{"id":249,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"What does the parameter k represent in K-Means clustering?","answer_letter":"H","answer":"Number of clusters","explanation":"解析：答案为「Number of clusters」。  聚类是无监督学习，将相似样本归为同一组。"},{"id":250,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"Which method helps determine the optimal value of K in K-Means?","answer_letter":"E","answer":"Elbow Method","explanation":"解析：答案为「Elbow Method」。"},{"id":251,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"What is the name of the tree-like structure produced by Hierarchical Clustering?","answer_letter":"B","answer":"Dendrogram","explanation":"解析：答案为「Dendrogram」。"},{"id":252,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"In Hierarchical Clustering, what does a low merge height indicate?","answer_letter":"K","answer":"Very similar observations","explanation":"解析：答案为「Very similar observations」。"},{"id":253,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"What problem occurs when distances become less meaningful as the number of features increases?","answer_letter":"G","answer":"Curse of Dimensionality","explanation":"解析：答案为「Curse of Dimensionality」。"},{"id":254,"week":"Week 6.2 - First Part Quiz Questions & Answers","question":"Which dimensionality reduction technique projects data onto directions that maximize variance?","answer_letter":"A","answer":"PCA (Principal Component Analysis)","explanation":"解析：答案为「PCA (Principal Component Analysis)」。  PCA 通过找最大方差方向降低数据维度。"},{"id":255,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What is the main goal of PCA?","answer_letter":"A","answer":"Reduce dimensionality while preserving important information","explanation":"解析：答案为「Reduce dimensionality while preserving important information」。"},{"id":256,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"Which principal component captures the largest amount of variation in the data?","answer_letter":"C","answer":"PC1","explanation":"解析：答案为「PC1」。"},{"id":257,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What percentage of variance is preserved by PC1 and PC2 together in the PCA example?","answer_letter":"M","answer":"84%","explanation":"解析：答案为「84%」。"},{"id":258,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"Which dimensionality reduction technique is linear and highly interpretable?","answer_letter":"I","answer":"PCA","explanation":"解析：答案为「PCA」。  PCA 通过找最大方差方向降低数据维度。"},{"id":259,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"Which dimensionality reduction technique is non-linear and excels at visualization?","answer_letter":"J","answer":"t-SNE","explanation":"解析：答案为「t-SNE」。"},{"id":260,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What does Association Rule Mining discover in a dataset?","answer_letter":"H","answer":"Relationships between items","explanation":"解析：答案为「Relationships between items」。"},{"id":261,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What metric measures how frequently a rule appears in a dataset?","answer_letter":"K","answer":"Support","explanation":"解析：答案为「Support」。"},{"id":262,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What metric measures how reliable an association rule is?","answer_letter":"O","answer":"Confidence","explanation":"解析：答案为「Confidence」。"},{"id":263,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What does a Lift value greater than 1 indicate?","answer_letter":"G","answer":"Positive association between items","explanation":"解析：答案为「Positive association between items」。"},{"id":264,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"In the rule {Diapers} → {Beer}, what does Confidence represent?","answer_letter":"B","answer":"Probability of buying beer given diapers","explanation":"解析：答案为「Probability of buying beer given diapers」。"},{"id":265,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What is the main purpose of the Apriori algorithm?","answer_letter":"D","answer":"Discover frequent itemsets and association rules","explanation":"解析：答案为「Discover frequent itemsets and association rules」。"},{"id":266,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What type of business application groups customers according to purchasing behavior?","answer_letter":"E","answer":"Customer Segmentation","explanation":"解析：答案为「Customer Segmentation」。"},{"id":267,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What is the primary goal of Anomaly Detection?","answer_letter":"N","answer":"Identify rare or unusual observations","explanation":"解析：答案为「Identify rare or unusual observations」。"},{"id":268,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What is the bottleneck or latent space in an autoencoder?","answer_letter":"F","answer":"Compressed representation of the data","explanation":"解析：答案为「Compressed representation of the data」。"},{"id":269,"week":"Week 6.2 - Second Part Quiz Questions & Answers","question":"What is one major challenge of unsupervised learning?","answer_letter":"L","answer":"Evaluating results without ground truth labels","explanation":"解析：答案为「Evaluating results without ground truth labels」。"}];

<script>
const LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O'];

const state = {
  mode: 'menu',
  currentIndex: 0,
  revealed: false,
  selected: null,
  answered: false,
  wrongIds: JSON.parse(localStorage.getItem('quiz_wrong') || '[]'),
  studyWeek: 'all',
  filteredQ: [],
  randomQ: [],
  randomOpts: [],
  allOpts: [],
  randomResults: [],
  score: { correct: 0, wrong: 0 },
  finished: false,
};

const weeks = [...new Set(QUIZ_DATA.map(q => q.week))];
function saveWrong(){ localStorage.setItem('quiz_wrong', JSON.stringify(state.wrongIds)); }
function addWrong(id){ if(!state.wrongIds.includes(id)){state.wrongIds.push(id);saveWrong();} }
function removeWrong(id){ state.wrongIds=state.wrongIds.filter(x=>x!==id);saveWrong(); }

// 为每道题生成选项（1个正确 + 3个干扰项）
function buildOptions(q, allQ) {
  const correct = { letter: q.answer_letter, text: q.answer, isCorrect: true };
  // 从同 week 优先，再全局随机取干扰项
  const pool = allQ.filter(x => x.id !== q.id);
  const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, 3);
  const distractors = shuffled.map(x => ({ letter: x.answer_letter, text: x.answer, isCorrect: false }));
  const opts = [correct, ...distractors].sort(() => Math.random() - 0.5);
  // 重新分配字母 A/B/C/D
  return opts.map((o, i) => ({ ...o, displayLetter: LETTERS[i] }));
}

function render() {
  const root = document.getElementById('root');
  if (state.mode === 'menu') root.innerHTML = renderMenu();
  else if (state.mode === 'study') root.innerHTML = renderStudy();
  else if (state.mode === 'random') root.innerHTML = renderRandom();
  else if (state.mode === 'wrong') root.innerHTML = renderWrong();
  else if (state.mode === 'result') root.innerHTML = renderResult();
}

function renderMenu() {
  return `
    <div class="hero">
      <div class="hero-badge">✦ Quiz System</div>
      <h1>刷题练习</h1>
      <p class="hero-sub">系统性掌握知识点，告别死记硬背</p>
      <div class="stats-row">
        <div class="stat-pill"><span class="num">269</span><span class="lbl">题目总数</span></div>
        <div class="stat-pill"><span class="num">18</span><span class="lbl">章节覆盖</span></div>
        <div class="stat-pill"><span class="num">3</span><span class="lbl">练习模式</span></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="menu">
      <div class="menu-card" onclick="startStudy()">
        <span class="icon">📖</span>
        <h3>背题模式</h3>
        <p>按章节顺序浏览，点击显示答案与解析</p>
        <span class="card-tag">顺序学习</span>
      </div>
      <div class="menu-card" onclick="startRandom()">
        <span class="icon">🎲</span>
        <h3>随机刷题</h3>
        <p>四选一智能出题，即时反馈对错</p>
        <span class="card-tag">强化训练</span>
      </div>
      <div class="menu-card" onclick="startWrong()">
        <span class="icon">❌</span>
        <h3>错题本 <span class="wrong-count">${state.wrongIds.length}</span></h3>
        <p>集中复习所有做错的题目</p>
        <span class="card-tag">查漏补缺</span>
      </div>
      <div class="menu-card" onclick="window.location.href='/'">
        <span class="icon">🏠</span>
        <h3>返回博客</h3>
        <p>回到 Tandy's Blog 首页</p>
        <span class="card-tag" style="background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.2);color:#34d399">← 返回</span>
      </div>
    </div>`;
}

function renderStudy() {
  const q = state.filteredQ[state.currentIndex];
  if (!q) return '<div class="empty-state"><div class="icon">✅</div><p>已浏览全部题目</p></div>';
  const total = state.filteredQ.length;
  const pct = ((state.currentIndex+1)/total*100).toFixed(0);
  const isWrong = state.wrongIds.includes(q.id);
  const indexPanel = renderIndexPanel(state.filteredQ, state.currentIndex, null, 'study');
  return `
    <button class="back-btn" onclick="goMenu()">← 返回主菜单</button>
    <div class="week-selector">
      <select onchange="changeWeek(this.value)">
        <option value="all" ${state.studyWeek==='all'?'selected':''}>全部章节（${QUIZ_DATA.length} 题）</option>
        ${weeks.map(w=>`<option value="${w}" ${state.studyWeek===w?'selected':''}>${w}（${QUIZ_DATA.filter(x=>x.week===w).length}题）</option>`).join('')}
      </select>
    </div>
    <div class="quiz-layout">
      <div class="quiz-main">
        <div class="card">
          <div class="progress">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <span class="progress-text">${state.currentIndex+1} / ${total}</span>
          </div>
          <div class="week-tag">${q.week}</div>
          <div class="question">${state.currentIndex+1}. ${q.question}</div>
          <div class="answer-area">
            <div class="answer-box ${state.revealed?'answer-visible':'answer-blur'}">
              <div class="answer-label">答案</div>
              <div class="answer-text"><span class="answer-letter">${q.answer_letter}</span>${q.answer}</div>
              <div class="explanation">${q.explanation}</div>
            </div>
            ${!state.revealed?'<button class="reveal-btn" onclick="reveal()">点击显示答案</button>':''}
          </div>
          <div class="actions">
            <button class="btn btn-ghost" onclick="prevQ()" ${state.currentIndex===0?'disabled':''}>← 上一题</button>
            ${isWrong
              ?`<button class="btn btn-success" onclick="toggleWrong(${q.id})">✓ 移出错题</button>`
              :`<button class="btn btn-danger" onclick="toggleWrong(${q.id})">✗ 加入错题</button>`}
            <button class="btn btn-primary" onclick="nextQ()">下一题 →</button>
          </div>
        </div>
      </div>
      ${indexPanel}
    </div>`;
}

function renderRandom() {
  if (state.finished) return renderResult();
  const q = state.randomQ[state.currentIndex];
  if (!q) return renderResult();
  const total = state.randomQ.length;
  const pct = (state.currentIndex/total*100).toFixed(0);
  const opts = state.randomOpts;
  const optsHtml = opts.map((o, i) => {
    let cls = 'option';
    if (state.answered) {
      if (o.isCorrect) cls += ' correct';
      else if (state.selected === i) cls += ' wrong';
      cls += ' disabled';
    } else if (state.selected === i) cls += ' selected';
    return `<div class="${cls}" onclick="selectOpt(${i})"><div class="opt-check"></div><span class="opt-letter">${o.displayLetter}.</span><span class="opt-text">${o.text}</span></div>`;
  }).join('');
  const expHtml = state.answered ? `<div class="explanation-box">${q.explanation}</div>` : '';
  const nextBtn = state.answered ? `<div class="actions" style="margin-top:16px"><button class="btn btn-primary" onclick="nextRandom()">下一题 →</button></div>` : '';
  const indexPanel = renderIndexPanel(state.randomQ, state.currentIndex, state.randomResults, 'random');
  return `
    <button class="back-btn" onclick="goMenu()">← 返回主菜单</button>
    <div class="quiz-layout">
      <div class="quiz-main">
        <div class="card">
          <div class="progress">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <span class="progress-text">${state.currentIndex+1} / ${total}</span>
          </div>
          <div class="week-tag">${q.week}</div>
          <div class="question">${state.currentIndex+1}. ${q.question}</div>
          <div class="options">${optsHtml}</div>
          ${expHtml}${nextBtn}
        </div>
      </div>
      ${indexPanel}
    </div>`;
}

function renderWrong() {
  const wrongQs = QUIZ_DATA.filter(q => state.wrongIds.includes(q.id));
  if (!wrongQs.length) return `
    <button class="back-btn" onclick="goMenu()">← 返回主菜单</button>
    <div class="empty-state"><div class="icon">🎉</div><p>错题本是空的，继续加油！</p></div>`;
  return `
    <button class="back-btn" onclick="goMenu()">← 返回主菜单</button>
    <p style="color:#64748b;font-size:.87rem;margin-bottom:14px">共 ${wrongQs.length} 道错题</p>
    <div class="wrong-list">
      ${wrongQs.map(q=>`
        <div class="wrong-item">
          <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
            <div class="wrong-q">${q.question}</div>
            <button onclick="removeWrong(${q.id});render()" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:.78rem;white-space:nowrap">移除</button>
          </div>
          <div class="wrong-a"><span class="answer-letter">${q.answer_letter}</span>${q.answer}</div>
          <div class="wrong-exp">${q.explanation}</div>
          <div style="font-size:.76rem;color:#334155;margin-top:6px">${q.week}</div>
        </div>`).join('')}
    </div>`;
}

function renderResult() {
  const total = state.score.correct + state.score.wrong;
  const pct = total ? Math.round(state.score.correct/total*100) : 0;
  const msg = pct>=90?'🎉 优秀！':pct>=70?'👍 不错！':pct>=50?'💪 继续加油！':'📚 需要多练习';
  return `
    <div class="result">
      <div style="font-size:1.1rem;color:#64748b">${msg}</div>
      <div class="result-score">${pct}%</div>
      <div class="result-stats">
        <div class="stat"><div class="stat-num" style="color:#34d399">${state.score.correct}</div><div class="stat-label">答对</div></div>
        <div class="stat"><div class="stat-num" style="color:#ef4444">${state.score.wrong}</div><div class="stat-label">答错</div></div>
        <div class="stat"><div class="stat-num" style="color:#7dd3fc">${total}</div><div class="stat-label">总题数</div></div>
      </div>
      <div class="actions" style="justify-content:center;max-width:300px;margin:0 auto">
        <button class="btn btn-primary" onclick="startRandom()">再来一轮</button>
        <button class="btn btn-ghost" onclick="goMenu()">返回菜单</button>
      </div>
    </div>`;
}

// ===== 交互 =====
function goMenu(){ state.mode='menu'; render(); }

function startStudy(){
  state.mode='study'; state.studyWeek='all';
  state.filteredQ=[...QUIZ_DATA]; state.currentIndex=0; state.revealed=false; render();
}
function changeWeek(val){
  state.studyWeek=val;
  state.filteredQ=val==='all'?[...QUIZ_DATA]:QUIZ_DATA.filter(q=>q.week===val);
  state.currentIndex=0; state.revealed=false; render();
}
function reveal(){ state.revealed=true; render(); }
function prevQ(){ if(state.currentIndex>0){state.currentIndex--;state.revealed=false;render();} }
function nextQ(){ if(state.currentIndex<state.filteredQ.length-1){state.currentIndex++;state.revealed=false;render();} }
function toggleWrong(id){ if(state.wrongIds.includes(id)) removeWrong(id); else addWrong(id); render(); }

function startRandom(){
  state.mode='random';
  state.randomQ=[...QUIZ_DATA].sort(()=>Math.random()-.5);
  state.allOpts=state.randomQ.map(q=>buildOptions(q,QUIZ_DATA));
  state.randomResults=new Array(state.randomQ.length).fill(null);
  state.currentIndex=0; state.selected=null; state.answered=false;
  state.score={correct:0,wrong:0}; state.finished=false;
  state.randomOpts=state.allOpts[0];
  render();
}

function selectOpt(i){
  if(state.answered) return;
  state.selected = i;
  state.answered = true;
  const isCorrect = state.randomOpts[i].isCorrect;
  state.randomResults[state.currentIndex] = isCorrect ? 'ok' : 'err';
  if(isCorrect) state.score.correct++;
  else { state.score.wrong++; addWrong(state.randomQ[state.currentIndex].id); }
  render();
}

function nextRandom(){
  if(state.currentIndex < state.randomQ.length-1){
    state.currentIndex++;
    state.selected=null; state.answered=false;
    state.randomOpts=state.allOpts[state.currentIndex];
    render();
  } else { state.finished=true; render(); }
}

function startWrong(){ state.mode='wrong'; render(); }

function renderIndexPanel(questions, currentIdx, results, mode) {
  const items = questions.map((q, i) => {
    let cls = 'ib';
    if (i === currentIdx) cls += ' cur';
    else if (mode === 'random' && results && results[i]) cls += ' ' + results[i];
    else if (mode === 'study' && state.wrongIds.includes(q.id)) cls += ' mark';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
  return `<div class="idx-panel"><div class="idx-title">题目索引</div><div class="idx-grid">${items}</div></div>`;
}

function jumpTo(i) {
  state.currentIndex = i;
  state.revealed = false;
  if (state.mode === 'random') {
    const res = state.randomResults[i];
    state.answered = res !== null;
    state.selected = null;
    state.randomOpts = state.allOpts[i];
  }
  render();
}

render();
</script>
</body>
</html>
